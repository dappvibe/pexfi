name: E2E Tests

on:
  push:
    branches:
      - '**'
    paths:
      - '.github/workflows/e2e.yml'
      - 'package.json'
      - 'compose.yml'
      - 'evm/**'
      - 'src/**'
      - 'tests/e2e/**'
      - 'subgraph/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VITE_ALCHEMY_KEY: ${{ secrets.VITE_ALCHEMY_KEY }}
      WALLET_CONNECT_PROJECT_ID: ${{ secrets.WALLET_CONNECT_PROJECT_ID }}
      VITE_THIRDWEB_CLIENT_ID: ${{ secrets.VITE_THIRDWEB_CLIENT_ID }}
      VITE_CRISP_ID: ${{ secrets.VITE_CRISP_ID }}
      NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${{ secrets.WALLET_CONNECT_PROJECT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore node_modules cache
        uses: actions/cache/restore@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: Save node_modules cache
        uses: actions/cache/save@v4
        if: steps.npm-cache.outputs.cache-hit != 'true'
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: Restore playwright binaries cache
        uses: actions/cache/restore@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Save playwright binaries cache
        uses: actions/cache/save@v4
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright OS Dependencies
        run: npx playwright install-deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Create .cache directory to prevent Docker root ownership
        run: mkdir -p .cache

      - name: Start EVM node
        run: docker compose up --wait evm

      - name: Deploy Mock Dependencies
        run: npx hardhat ignition deploy evm/modules/00_MockDependencies.ts --network localhost --build-profile=default

      - name: Run local params
        run: npx hardhat run evm/ignition/localparams.ts --network localhost

      - name: Deploy Market
        run: npx hardhat ignition deploy evm/modules/01_Market.ts --parameters evm/ignition/parameters/localhost.json --network localhost --build-profile=default

      - name: Start Subgraph service
        run: docker compose up --wait subgraph

      - name: Build Web for E2E
        run: npm run build:web -- --mode development

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Dump Docker logs
        if: always()
        run: |
          docker logs pexfi-evm-1 > .cache/evm.log 2>&1 || true
          docker logs pexfi-subgraph-1 > .cache/subgraph.log 2>&1 || true
          docker logs pexfi-subgraph-node-1 > .cache/subgraph-node.log 2>&1 || true
          docker logs pexfi-postgres-1 > .cache/postgres.log 2>&1 || true
          docker logs pexfi-ipfs-1 > .cache/ipfs.log 2>&1 || true

      - name: Upload Docker logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-compose-logs
          path: .cache/*.log
          retention-days: 30

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: .cache/playwright/report/
          retention-days: 30

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: .cache/playwright/results/
          retention-days: 30
