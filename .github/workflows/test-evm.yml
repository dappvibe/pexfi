name: EVM Tests

on:
  push:
    paths:
      - 'evm/**'
      - 'tests/hardhat/**'
  pull_request:
    paths:
      - 'evm/**'
      - 'tests/hardhat/**'

jobs:
  test-evm:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npm run test:evm
