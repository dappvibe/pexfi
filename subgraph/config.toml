[store]
[store.primary]
connection = "postgresql://graph-node:let-me-in@postgres:5432/graph-node"
pool_size = 10

[chains]
ingestor = "default"

[chains.sepolia]
shard = "primary"
provider = [
  { label = "alchemy", details = { type = "web3", features = ['archive'], transport = "rpc", url = "https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}" } },
]

[deployment]
[[deployment.rule]]
indexers = ["default"]
get_logs_max_block_range = 10
max_parallel_requests = 3
