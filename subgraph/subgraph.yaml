specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Market
    network: "31337"
    source:
      abi: Market
      address: "0x7700aD9484F16662010B2dDd5b56A0b6F8c4c3b3"
      startBlock: 10402947
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Offer
        - Profile
        - Token
        - Fiat
        - Method
      abis:
        - name: Market
          file: ../.cache/artifacts/evm/protocol/Market.sol/Market.json
        - name: Offer
          file: ../.cache/artifacts/evm/protocol/Offer.sol/Offer.json
        - name: Token
          file: ../.cache/artifacts/@openzeppelin/contracts/token/ERC20/ERC20.sol/ERC20.json
        - name: Profile
          file: ../.cache/artifacts/evm/protocol/Profile.sol/Profile.json
        - name: Deal
          file: ../.cache/artifacts/evm/protocol/Deal.sol/Deal.json
        - name: Finder
          file: ../.cache/artifacts/@uma/core/contracts/data-verification-mechanism/implementation/Finder.sol/Finder.json
      eventHandlers:
        - event: TokenAdded(address)
          handler: handleTokenAdded
        - event: TokenRemoved(address)
          handler: handleTokenRemoved
        - event: FiatAdded(bytes32,address)
          handler: handleFiatAdded
        - event: FiatRemoved(bytes32)
          handler: handleFiatRemoved
        - event: MethodAdded(bytes16,uint256)
          handler: handleMethodAdded
        - event: MethodsDisabledMask(uint256)
          handler: handleMethodsDisabledMask
        - event: OfferCreated(address,address,bytes32,address)
          handler: handleOfferCreated
        - event: DealCreated(indexed
            address,address,address,address,uint256,bytes16,string,string)
          handler: handleDealCreated
      file: ./src/market.ts
  - kind: ethereum/contract
    name: Profile
    network: "31337"
    source:
      abi: Profile
      address: "0x3a622DB2db50f463dF562Dc5F341545A64C580fc"
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Profile
      abis:
        - name: Profile
          file: ../.cache/artifacts/evm/protocol/Profile.sol/Profile.json
      eventHandlers:
        - event: UpdatedInfo(indexed uint256,string)
          handler: handleUpdatedInfo
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
      file: ./src/profile.ts
templates:
  - kind: ethereum/contract
    name: Offer
    network: "31337"
    source:
      abi: Offer
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Offer
      abis:
        - name: Offer
          file: ../.cache/artifacts/evm/protocol/Offer.sol/Offer.json
        - name: Market
          file: ../.cache/artifacts/evm/protocol/Market.sol/Market.json
        - name: Profile
          file: ../.cache/artifacts/evm/protocol/Profile.sol/Profile.json
        - name: Deal
          file: ../.cache/artifacts/evm/protocol/Deal.sol/Deal.json
        - name: Finder
          file: ../.cache/artifacts/@uma/core/contracts/data-verification-mechanism/implementation/Finder.sol/Finder.json
      eventHandlers:
        - event: OfferUpdated()
          handler: handleOfferUpdated
      file: ./src/offer.ts
  - kind: ethereum/contract
    name: Deal
    network: "31337"
    source:
      abi: Deal
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Deal
      abis:
        - name: Offer
          file: ../.cache/artifacts/evm/protocol/Offer.sol/Offer.json
        - name: Market
          file: ../.cache/artifacts/evm/protocol/Market.sol/Market.json
        - name: Profile
          file: ../.cache/artifacts/evm/protocol/Profile.sol/Profile.json
        - name: Deal
          file: ../.cache/artifacts/evm/protocol/Deal.sol/Deal.json
        - name: Finder
          file: ../.cache/artifacts/@uma/core/contracts/data-verification-mechanism/implementation/Finder.sol/Finder.json
      eventHandlers:
        - event: DealState(uint8,address)
          handler: handleDealState
        - event: FeedbackGiven(address,bool,string)
          handler: handleFeedbackGiven
        - event: Message(address,string)
          handler: handleMessage
        - event: DisputeResolved(bytes32)
          handler: handleDisputeResolved
      file: ./src/deal.ts
