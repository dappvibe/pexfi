volumes:
  subgraph:

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      # Caddy writes to /data/caddy
      - subgraph:/data
    depends_on:
      - graph-node

  graph-node:
    restart: unless-stopped
    depends_on:
      - ipfs
      - postgres
    image: graphprotocol/graph-node:v0.35.0
    ports:
      - '8000:8000'
      - '8001:8001'
      - '8020:8020'
      - '8030:8030'
      - '8040:8040'
    env_file:
      - ../.env
    environment:
      node_id: default
      ipfs: 'ipfs:5001'
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ethereum: 'sepolia:https://eth-sepolia.g.alchemy.com/v2/${ALCHEMY_KEY}'
      GRAPH_LOG: debug
      ETHEREUM_POLLING_INTERVAL: 12000
      GRAPH_ETHEREUM_REQUEST_RETRIES: 3
      ETHEREUM_BLOCK_BATCH_SIZE: 1
      GRAPH_ETHEREUM_MAX_BLOCK_RANGE_SIZE: 10
      GRAPH_ETHEREUM_MAX_EVENT_ONLY_RANGE: 10
      GRAPH_ETHEREUM_BLOCK_INGESTOR_MAX_CONCURRENT_JSON_RPC_CALLS_FOR_TXN_RECEIPTS: 1

  postgres:
    restart: unless-stopped
    image: postgres:14
    ports:
      - '5432:5432'
    command: ['postgres', '-cshared_preload_libraries=pg_stat_statements', '-cmax_connections=200']
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      POSTGRES_INITDB_ARGS: '-E UTF8 --locale=C'
    volumes:
      # Postgres uses /var/lib/postgresql/data. Data will be stored in volume root under 'data/'
      - subgraph:/var/lib/postgresql

  ipfs:
    restart: unless-stopped
    image: ipfs/kubo:v0.17.0
    ports:
      - '5001:5001'
    volumes:
      # IPFS uses /data/ipfs. Data will be stored in volume root under 'ipfs/'
      - subgraph:/data
