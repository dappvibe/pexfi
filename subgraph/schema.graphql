type Offer @entity(immutable: false) {
  id: ID!
  owner: Bytes!
  profile: Profile
  isSell: Boolean!
  token: Token!
  fiat: Bytes!
  methods: BigInt!
  rate: Int!
  minFiat: Int!
  maxFiat: Int!
  terms: String!
  disabled: Boolean!

  # sorting order based on price factored by profile rating
  ranging: BigInt!
}

type Token @entity(immutable: false) {
  # address used as PK
  id: ID!
  address: Bytes!
  name: String!
  symbol: String!
  decimals: Int!
  pool: Bytes!
  removed: Boolean!
}

type Fiat @entity(immutable: false) {
  # symbol used as PK
  id: ID!
  symbol: String!
  feed: Bytes!
  removed: Boolean!
}

type Method @entity(immutable: false) {
  # index used as PK
  id: ID!
  name: String!
  index: BigInt!
  disabled: Boolean!
}

type Deal @entity(immutable: false) {
  id: ID!
  createdAt: Int!
  state: Int8!
  offer: Offer!
  taker: Bytes!
  tokenAmount: BigInt!
  fiatAmount: BigInt!
  method: Bytes!
  terms: String
  paymentInstructions: String!
  allowCancelUnacceptedAfter: Int!
  allowCancelUnpaidAfter: Int!
  messages: [DealMessage!]!
  feedbackForOwner: Feedback
  feedbackForTaker: Feedback
}
type DealMessage @entity(immutable: true) {
  id: Bytes!
  sender: Bytes!
  message: String!
  createdAt: Int!
}

# Rep NFT
type Profile @entity(immutable: false) {
  id: ID!
  createdAt: Int!
  # used in offers sorting
  goodstanding: Boolean!
  rating: Int!
  upvotes: Int!
  downvotes: Int!
  volumeUSD: Int!
  dealsCompleted: Int!
  dealsExpired: Int!
  disputesLost: Int!
  avgPaymentTime: Int!
  avgReleaseTime: Int!
}

type Feedback @entity(immutable: false) {
  id: ID!
  given: Boolean
  upvote: Boolean
  message: String!
}

type Notification @entity(immutable: true) {
  id: ID!
  createdAt: Int!
  to: Bytes!
  deal: Deal!
  event: NotificationEvent!
}
type NotificationEvent @entity(immutable: true) {
  id: ID!
  name: String!
  arg0: String
  arg1: String
  arg2: String
  arg3: String
}
